<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Confirmed · PaperTrail Academic</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:       #1a2744;
      --blue:       #4A6FA5;
      --gold:       #C9A84C;
      --gold-light: #e8c96a;
      --warm-white: #fffefb;
      --ink-light:  #7a7a96;
      --border:     #e2ddd6;
      --green-bg:   #edf7f2;
      --shadow-lg:  0 8px 32px rgba(26,39,68,0.14);
      --radius:     8px;
      --radius-lg:  14px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(74,111,165,0.3) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.15) 0%, transparent 50%);
      pointer-events: none;
    }

    .card {
      position: relative;
      background: var(--warm-white);
      border-radius: var(--radius-lg);
      padding: 48px;
      width: 440px;
      max-width: calc(100vw - 32px);
      box-shadow: var(--shadow-lg);
      text-align: center;
    }

    .logo { margin-bottom: 32px; }
    .logo a {
      text-decoration: none;
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: #1a2744;
    }
    .logo a span { color: var(--gold); font-style: italic; }

    .success-icon {
      width: 64px; height: 64px;
      background: var(--green-bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 28px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 24px;
      font-weight: 400;
      color: #1a2744;
      margin-bottom: 12px;
    }

    p {
      font-size: 14px;
      color: var(--ink-light);
      line-height: 1.7;
      margin-bottom: 28px;
    }

    .actions { display: flex; flex-direction: column; gap: 10px; }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 24px;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
      border: none;
    }

    .btn-primary { background: var(--gold); color: #1a2744; }
    .btn-primary:hover { background: var(--gold-light); }

    .btn-secondary { background: transparent; color: var(--blue); border: 1.5px solid var(--blue); }
    .btn-secondary:hover { background: #e8eef6; }

    .footer-note {
      font-size: 12px;
      color: var(--ink-light);
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .footer-note a { color: var(--blue); text-decoration: none; }
    .footer-note a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">

  <div class="logo">
    <a href="https://papertrailacademic.com">PaperTrail <span>Academic</span></a>
  </div>

  <div class="success-icon">✓</div>

  <h1>You're confirmed.</h1>

  <p>Your PaperTrail Academic account is active. Thank you for joining — we built this for teachers like you.</p>

  <div class="actions">
    <a href="javascript:void(0)" onclick="window.close()" class="btn btn-primary">← Back to my document</a>
    <a href="https://papertrailacademic.com" class="btn btn-secondary">Go to PaperTrail Academic</a>
  </div>

  <div class="footer-note">
    Questions? <a href="mailto:support@papertrailacademic.com">support@papertrailacademic.com</a>
  </div>

</div>

<script>
(function () {
  const EXTENSION_ID  = 'kgkjmhfoijiiplbmablcjbooopndjbgm';
  const SUPABASE_URL  = 'https://ktzrdhiqhidexunucuqp.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0enJkaGlxaGlkZXh1bnVjdXFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MTQ2ODMsImV4cCI6MjA4ODE5MDY4M30.24Gbyh0C-wbDqQ31MD-ttXoCfLwjcWvjs9-UXAaqmHU';

  async function tryAutoSignIn() {
    const hash   = window.location.hash.slice(1);
    const params = new URLSearchParams(hash);
    const accessToken  = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    const expiresAt    = params.get('expires_at');
    const type         = params.get('type');

    // Only proceed for signup/email confirmation tokens
    console.log('hash:', hash);
console.log('accessToken:', accessToken);
console.log('type:', type);
if (!accessToken || (type !== 'signup' && type !== 'email_change')) return;

    // Fetch the user object
    let user;
    try {
      const res = await fetch(SUPABASE_URL + '/auth/v1/user', {
        headers: {
          'apikey': SUPABASE_ANON,
          'Authorization': 'Bearer ' + accessToken
        }
      });
      if (!res.ok) return;
      user = await res.json();
    } catch (e) { return; }

    // Send session to extension
    if (typeof chrome === 'undefined' || !chrome.runtime) return;
    try {
      chrome.runtime.sendMessage(
        EXTENSION_ID,
        {
          type:    'STORE_SESSION_FROM_WEB',
          session: {
            access_token:  accessToken,
            refresh_token: refreshToken,
            expires_at:    expiresAt ? Number(expiresAt) : null
          },
          user: {
            id:    user.id,
            email: user.email
          }
        },
        function (response) {
          if (chrome.runtime.lastError) { /* extension not installed, fine */ }
        }
      );
    } catch (e) { /* not Chrome or extension not installed, fine */ }
  }

  tryAutoSignIn();
})();
</script>
</body>
</html>
