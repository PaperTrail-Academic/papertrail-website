<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — PaperTrail Academic</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --blue:#4A6FA5; --gold:#C9A84C; --teal:#2a7a6b; --ink:#1a2235; --clever:#4274F6; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',system-ui,sans-serif; color:var(--ink); background:#f7f9fc; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; }
  .card { background:#fff; border:1px solid #e3e8f0; border-radius:14px; padding:40px 36px; max-width:420px; width:100%; text-align:center; box-shadow:0 4px 24px rgba(26,34,53,.06); }
  .logo { width:48px; height:48px; margin:0 auto 16px; display:block; }
  h1 { font-family:'Lora',serif; font-size:21px; font-weight:600; margin-bottom:8px; line-height:1.3; }
  h1 em { color:var(--gold); font-style:italic; }
  p.sub { font-size:14px; color:#66738c; line-height:1.6; margin-bottom:26px; }
  .clever-btn { display:inline-flex; align-items:center; justify-content:center; gap:10px; width:100%; padding:13px 22px; background:var(--clever); color:#fff; border-radius:8px; font-family:'DM Sans',system-ui,sans-serif; font-weight:700; font-size:15px; text-decoration:none; border:none; cursor:pointer; }
  .clever-btn:hover { background:#3768e0; }
  .fineprint { font-size:12px; color:#8b95aa; margin-top:22px; line-height:1.5; }
  .fineprint a { color:var(--blue); }
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/icon128.png" alt="PaperTrail Academic">
    <h1>Sign in to PaperTrail&trade; <em>Academic</em></h1>
    <p class="sub">For teachers whose school uses Clever. After signing in you can connect the PaperTrail Chrome extension to the same account.</p>

    <button class="clever-btn" id="clever-login-btn" type="button">
      <svg width="20" height="20" viewBox="0 0 48 48"><rect width="48" height="48" rx="10" fill="#fff"/><path d="M25.6 34.8c-6.1 0-10.6-4.6-10.6-10.7v-.1c0-6 4.4-10.8 10.8-10.8 3.9 0 6.3 1.3 8.2 3.2l-2.9 3.4c-1.6-1.5-3.2-2.4-5.3-2.4-3.5 0-6 2.9-6 6.5v.1c0 3.6 2.5 6.6 6 6.6 2.4 0 3.8-1 5.5-2.5l2.9 3c-2.1 2.2-4.4 3.7-8.6 3.7z" fill="#4274F6"/></svg>
      Log in with Clever
    </button>

    <p class="fineprint">
      Not a Clever school? PaperTrail also works with a free email account inside the
      <a href="https://chromewebstore.google.com/detail/papertrail/kgkjmhfoijiiplbmablcjbooopndjbgm" target="_blank" rel="noopener">Chrome extension</a>.
    </p>
  </div>
<script>
  document.getElementById('clever-login-btn').addEventListener('click', function () {
    var state = (window.crypto && crypto.randomUUID) ? crypto.randomUUID()
      : String(Date.now()) + Math.random().toString(36).slice(2);
    try { sessionStorage.setItem('pt_clever_state', state); } catch (_) {}
    window.location.href = 'https://clever.com/oauth/authorize'
      + '?response_type=code'
      + '&client_id=6f5f18fdfec504af7d7f'
      + '&redirect_uri=' + encodeURIComponent('https://papertrailacademic.com/auth/clever/callback/')
      + '&state=' + encodeURIComponent(state);
  });
</script>
</body>
</html>
