<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — PaperTrail</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  body{font-family:'DM Sans',system-ui,sans-serif;background:#f7f9fc;margin:0;padding:22px;color:#243044}
  h1{font-size:16px;margin:0 0 4px}
  p{font-size:12px;color:#66738c;margin:0 0 16px;line-height:1.5}
  input{width:100%;box-sizing:border-box;border:1px solid #e3e8f0;border-radius:8px;padding:10px;font-size:13px;margin-bottom:8px}
  button{width:100%;border:none;border-radius:8px;padding:11px;font-weight:700;font-size:13px;color:#fff;background:#4A6FA5;cursor:pointer}
  .oauth{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px}
  #google{background:#fff;color:#243044;border:1px solid #dadce0}
  #microsoft{background:#fff;color:#243044;border:1px solid #dadce0}
  #clever{background:#4274F6;margin-bottom:12px}
  .divider{display:flex;align-items:center;gap:8px;margin:4px 0 12px}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:#e3e8f0}
  .divider span{font-size:11px;color:#8b95aa;white-space:nowrap}
  #msg{font-size:12px;color:#b4544a;min-height:16px;margin-top:8px}
  .hint{font-size:11px;color:#8b95aa;margin-top:12px;line-height:1.5}
</style>
</head>
<body>
  <h1>Sign in to PaperTrail</h1>
  <p>Use the same account as your Chrome extension or the website — tokens and subscription carry over.</p>

  <button id="google" class="oauth" type="button">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9.1 3.6l6.8-6.8C35.9 2.4 30.3 0 24 0 14.6 0 6.5 5.4 2.6 13.2l7.9 6.1C12.4 13.2 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.4c-.5 2.9-2.1 5.3-4.6 7l7.1 5.5c4.2-3.9 6.6-9.6 6.6-16.5z"/><path fill="#FBBC05" d="M10.5 28.3c-.5-1.4-.7-2.9-.7-4.3s.3-3 .7-4.3l-7.9-6.1C1 16.7 0 20.2 0 24s1 7.3 2.6 10.4l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.5 0 11.9-2.1 15.9-5.8l-7.1-5.5c-2 1.3-4.5 2.1-8.8 2.1-6.3 0-11.6-3.7-13.5-9.8l-7.9 6.1C6.5 42.6 14.6 48 24 48z"/></svg>
    Continue with Google
  </button>

  <button id="microsoft" class="oauth" type="button">
    <svg width="16" height="16" viewBox="0 0 23 23"><path fill="#f25022" d="M1 1h10v10H1z"/><path fill="#7fba00" d="M12 1h10v10H12z"/><path fill="#00a4ef" d="M1 12h10v10H1z"/><path fill="#ffb900" d="M12 12h10v10H12z"/></svg>
    Sign in with Microsoft
  </button>

  <button id="clever" class="oauth" type="button">
    <svg width="18" height="18" viewBox="0 0 48 48"><rect width="48" height="48" rx="10" fill="#fff"/><path d="M25.6 34.8c-6.1 0-10.6-4.6-10.6-10.7v-.1c0-6 4.4-10.8 10.8-10.8 3.9 0 6.3 1.3 8.2 3.2l-2.9 3.4c-1.6-1.5-3.2-2.4-5.3-2.4-3.5 0-6 2.9-6 6.5v.1c0 3.6 2.5 6.6 6 6.6 2.4 0 3.8-1 5.5-2.5l2.9 3c-2.1 2.2-4.4 3.7-8.6 3.7z" fill="#4274F6"/></svg>
    Log in with Clever
  </button>

  <div class="divider"><span>or with email</span></div>

  <input id="email" type="email" placeholder="Email" autocomplete="username">
  <input id="pass" type="password" placeholder="Password" autocomplete="current-password">
  <button id="go">Sign in</button>
  <div id="msg"></div>
  <div class="hint">
    Signed in with Google or Microsoft above? That's all you need — your tokens
    and subscription carry over from the website and the Chrome extension.
  </div>

<script>
  'use strict';

  var SUPABASE_URL  = 'https://ktzrdhiqhidexunucuqp.supabase.co';
  var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0enJkaGlxaGlkZXh1bnVjdXFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MTQ2ODMsImV4cCI6MjA4ODE5MDY4M30.24Gbyh0C-wbDqQ31MD-ttXoCfLwjcWvjs9-UXAaqmHU';

  // ── Clever SSO ─────────────────────────────────────────────────────────
  // This page is its OWN Clever OAuth callback: the dialog navigates to Clever,
  // Clever redirects back here with ?code=..., and the code is exchanged via
  // the clever-auth edge function (which holds the client secret).
  // Register https://papertrailacademic.com/word-addin/auth-dialog.html as an
  // additional redirect URI in the Clever dashboard; clever.com is in AppDomains.
  var CLEVER_CLIENT_ID = '6f5f18fdfec504af7d7f';
  var DIALOG_URL = 'https://papertrailacademic.com/word-addin/auth-dialog.html';

  // ── Google / Microsoft (Supabase providers) ───────────────────────────
  // These use signInWithOAuth. We run the client in IMPLICIT flow so the
  // provider's session comes back in the URL #hash (#access_token=...), which
  // does NOT collide with Clever's ?code= query param — that's the whole reason
  // this single page can host both flows. redirectTo must be listed under
  // Supabase → Authentication → URL Configuration → Redirect URLs, and the
  // Microsoft login domains must be in the manifest <AppDomains>.
  var supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
    auth: {
      flowType: 'implicit',
      detectSessionInUrl: true,
      persistSession: false,
      autoRefreshToken: false
    }
  });

  var sent = false;          // guard: only one messageParent may fire
  var officeReady = false;
  var pendingAuth = null;    // { session, user } captured before Office is ready

  // Hand a signed-in session up to the taskpane and let it close the dialog.
  function doSend(session, user, profile) {
    if (sent) return;
    sent = true;
    Office.context.ui.messageParent(JSON.stringify({
      type: 'auth',
      access_token: session.access_token,
      email: (user && user.email) || (profile && profile.email),
      user_id: (user && user.id) || (user && user.user_id) || (profile && profile.id)
    }));
  }
  function maybeSend() {
    if (sent || !officeReady || !pendingAuth) return;
    doSend(pendingAuth.session, pendingAuth.user);
  }

  // Registered BEFORE Office.onReady so we never miss the SIGNED_IN that
  // detectSessionInUrl emits right after createClient parses the #hash.
  supa.auth.onAuthStateChange(function (event, session) {
    if (event === 'SIGNED_IN' && session) {
      pendingAuth = { session: session, user: session.user };
      maybeSend();
    }
  });

  Office.onReady(function () {
    officeReady = true;
    var msgEl = document.getElementById('msg');

    // 1) Returning from a Google/Microsoft OAuth redirect? The session arrives
    //    in the #hash. If a token or error is present, show status; the
    //    onAuthStateChange above (or getSession below) completes the handoff.
    if (/[#&]error/.test(window.location.hash)) {
      msgEl.textContent = 'Sign-in was cancelled or denied. Please try again.';
    } else if (/access_token=/.test(window.location.hash)) {
      msgEl.style.color = '#66738c';
      msgEl.textContent = 'Completing sign-in…';
    }
    supa.auth.getSession().then(function (r) {
      if (r && r.data && r.data.session) {
        pendingAuth = { session: r.data.session, user: r.data.session.user };
        maybeSend();
      }
    });
    maybeSend();

    // 2) Returning from Clever? Exchange the code exactly once (single-use, 60 s TTL).
    var qs = new URLSearchParams(window.location.search);
    var code = qs.get('code');
    if (qs.get('error')) {
      msgEl.textContent = 'Clever sign-in was cancelled or denied.';
    } else if (code) {
      try { history.replaceState(null, '', window.location.pathname); } catch (_) {}
      msgEl.style.color = '#66738c';
      msgEl.textContent = 'Completing Clever sign-in…';
      fetch(SUPABASE_URL + '/functions/v1/clever-auth', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON,
          'Authorization': 'Bearer ' + SUPABASE_ANON
        },
        body: JSON.stringify({ code: code, redirect_uri: DIALOG_URL })
      })
      .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, d: d }; }); })
      .then(function (res) {
        if (!res.ok || !res.d.ok) {
          msgEl.style.color = '#b4544a';
          msgEl.textContent = (res.d && res.d.error) || 'Clever sign-in failed. Please try again.';
          return;
        }
        doSend(res.d.session, res.d.user, res.d.profile);
      })
      .catch(function () {
        msgEl.style.color = '#b4544a';
        msgEl.textContent = 'Network error during Clever sign-in. Please try again.';
      });
    }

    // ── Button wiring ────────────────────────────────────────────────────
    document.getElementById('google').onclick = function () {
      msgEl.style.color = '#b4544a'; msgEl.textContent = '';
      supa.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: DIALOG_URL }
      }).then(function (r) {
        if (r && r.error) msgEl.textContent = r.error.message || 'Could not start Google sign-in.';
      });
    };

    document.getElementById('microsoft').onclick = function () {
      msgEl.style.color = '#b4544a'; msgEl.textContent = '';
      supa.auth.signInWithOAuth({
        provider: 'azure',
        options: { redirectTo: DIALOG_URL, scopes: 'openid email profile' }
      }).then(function (r) {
        if (r && r.error) msgEl.textContent = r.error.message || 'Could not start Microsoft sign-in.';
      });
    };

    document.getElementById('clever').onclick = function () {
      window.location.href = 'https://clever.com/oauth/authorize'
        + '?response_type=code'
        + '&client_id=' + encodeURIComponent(CLEVER_CLIENT_ID)
        + '&redirect_uri=' + encodeURIComponent(DIALOG_URL);
    };

    document.getElementById('go').onclick = async function () {
      msgEl.style.color = '#b4544a';
      msgEl.textContent = '';
      var email = document.getElementById('email').value.trim();
      var pass = document.getElementById('pass').value;
      const { data, error } = await supa.auth.signInWithPassword({ email: email, password: pass });
      if (error) { msgEl.textContent = error.message; return; }
      doSend(data.session, data.user);
    };
  });
</script>
</body>
</html>
